<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InveOptimizer | Miscelánea Clarita</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f8;
            font-family: 'Inter', sans-serif;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, #ff7b54, #f56036);
            color: white;
            padding: 25px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin: 0;
            font-weight: 500;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.05);
            background-color: #ffffff;
        }
        .card-title-custom {
            font-weight: 600;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary {
            background-color: #ff7b54;
            border: none;
            font-weight: 500;
            padding: 10px 20px;
        }
        .btn-primary:hover {
            background-color: #e56641;
        }
        .table {
            margin-bottom: 0;
        }
        .table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #495057;
        }
        #notificacion {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
            border-radius: 8px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }
        .input-group-text {
            background-color: #fff;
            border-right: none;
        }
        #buscador {
            border-left: none;
        }
        #buscador:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="bi bi-box-seam"></i> InveOptimizer</h1>
        <p>Miscelánea Clarita</p>
    </div>

    <div id="notificacion" class="alert d-none"></div>

    <div class="container">

        <div class="card p-4 mb-4">
            <h4 class="card-title-custom mb-4"><i class="bi bi-plus-circle-fill text-primary"></i> Agregar Producto</h4>
            <div class="row g-3">
                <div class="col-md-4">
                    <input id="nombre" class="form-control" placeholder="Nombre del producto">
                </div>
                <div class="col-md-4">
                    <input id="categoria" class="form-control" placeholder="Categoría">
                </div>
                <div class="col-md-4">
                    <input id="costo" type="number" class="form-control" placeholder="Costo">
                </div>
                <div class="col-md-4">
                    <input id="venta" type="number" class="form-control" placeholder="Precio de venta">
                </div>
                <div class="col-md-4">
                    <input id="stock" type="number" class="form-control" placeholder="Stock">
                </div>
                <div class="col-md-4">
                    <input id="stock_min" type="number" class="form-control" placeholder="Stock mínimo">
                </div>
            </div>
            <button onclick="agregarProducto()" class="btn btn-primary mt-4 w-100">
                <i class="bi bi-save"></i> Guardar Producto
            </button>
        </div>

        <div class="card p-4 mb-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="card-title-custom m-0"><i class="bi bi-table text-primary"></i> Inventario</h4>
                <h5 id="ganancias" class="m-0 text-success fw-bold"><i class="bi bi-cash-stack"></i> Ganancia Total: $0</h5>
            </div>
            
            <div class="input-group mb-4 shadow-sm">
                <span class="input-group-text border-end-0"><i class="bi bi-search text-muted"></i></span>
                <input type="text" id="buscador" class="form-control border-start-0" placeholder="Buscar producto..." onkeyup="filtrarProductos()">
            </div>
            
            <div class="table-responsive border rounded">
                <table class="table table-hover text-center align-middle" id="tabla"></table>
            </div>
        </div>

        <div class="card p-4 mt-4 mb-5">
            <h4 class="card-title-custom mb-4"><i class="bi bi-clock-history text-primary"></i> Historial de Movimientos</h4>
            <div class="table-responsive border rounded">
                <table class="table table-hover text-center align-middle" id="tablaMovimientos"></table>
            </div>
        </div>

    </div>

    <div class="modal fade" id="modalRestock">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title card-title-custom"><i class="bi bi-box-arrow-in-down text-success"></i> Reabastecer Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="number" id="cantidadRestock" class="form-control mb-3" placeholder="Cantidad a agregar">
                    <button class="btn btn-success w-100" onclick="confirmarRestock()">
                        <i class="bi bi-check-lg"></i> Confirmar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditar">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title card-title-custom"><i class="bi bi-pencil-square text-primary"></i> Editar Detalles</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label text-muted small mb-1 fw-bold">Costo del proveedor ($)</label>
                    <input type="number" id="editCosto" class="form-control mb-3" step="0.01">

                    <label class="form-label text-muted small mb-1 fw-bold">Precio de venta público ($)</label>
                    <input type="number" id="editVenta" class="form-control mb-3" step="0.01">

                    <label class="form-label text-muted small mb-1 fw-bold">Stock real en tienda</label>
                    <input type="number" id="editStock" class="form-control mb-4">

                    <button class="btn btn-primary w-100" onclick="guardarEdicion()">
                        <i class="bi bi-save"></i> Guardar Cambios
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>

</body>
</html>
