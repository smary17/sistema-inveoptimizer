<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InveOptimizer | Miscelánea Clarita</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(to right, #fff0e6, #ffe5d9);
            font-family: Arial, Helvetica, sans-serif;
        }

        .header {
            background: linear-gradient(135deg, #ff7b54, #ffb26b);
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 3rem;
            font-weight: bold;
        }

        .header p {
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background-color: #ff7b54;
            border: none;
        }

        .btn-primary:hover {
            background-color: #ff6333;
        }

        .table {
            border-radius: 15px;
            overflow: hidden;
        }

        #notificacion {
            position: fixed;
             top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
        }

    </style>

</head>
<body>

    <div class="header">
        <h1>📦 InveOptimizer</h1>
        <p>Miscelánea Clarita</p>
    </div>

    <div id="notificacion" class="alert d-none"></div>

    <div class="container mt-4">

        <div class="card p-4 mb-4">

            <h3 class="mb-4">➕ Agregar Producto</h3>

            <div class="row g-3">

                <div class="col-md-4">
                    <input id="nombre" class="form-control" placeholder="Nombre del producto">
                </div>

                <div class="col-md-4">
                    <input id="categoria" class="form-control" placeholder="Categoría">
                </div
